<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inline Cursor Test</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #000;
      color: #fff;
      margin: 0;
      padding: 20px;
    }
    
    h1, h2 {
      color: cyan;
    }
    
    .test-area {
      border: 1px solid #333;
      padding: 20px;
      margin: 20px 0;
      min-height: 200px;
    }
    
    button, a {
      display: inline-block;
      padding: 10px 20px;
      margin: 10px;
      background-color: #222;
      color: cyan;
      border: 1px solid cyan;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <h1>Inline Cursor Test</h1>
  <p>This is a test page for the inline cursor script.</p>
  
  <div class="test-area">
    <h2>Test Area</h2>
    <p>Move your mouse here to test the cursor.</p>
    <button>Test Button</button>
    <a href="#">Test Link</a>
  </div>
  
  <script src="/js/inline-cursor.js"></script>
</body>
</html>
